description: This folder(task) runs the cid extractor, extracts tables and paragraphs, translates them and writes as a text file.

ignore_docs: [ 202403141610289901.pdf, 202403151802373501.pdf, 202403151805270701.pdf, 202403281929163401.pdf, 202405161206295501.pdf, 202406241729441501.pdf, 202408131426417501.pdf, 202408201708303501.pdf, 202410031609123801.pdf, 202410151308555101.pdf, 202410151456351401.pdf, 202411291509028501.pdf, 202501141552287801.pdf, 202501201302191801.pdf, 202504151746483101.pdf, 202504251447511601.pdf, 202505051617349901.pdf, 202505231717412501.pdf, 202506241456485001.pdf, 202506241929156101.pdf, 202506271858406201.pdf, 202509041550461301.pdf, 202510141759206201.pdf, 202603091706385701.pdf, 202603091924368401.pdf, 202603091932018101.pdf, 202605081430408501.pdf ]

output_dir: 'output'
config_dir: 'conf'
output_stub: 'doc'

pipeline:
  - name: pdf_cid_info

  - name: pdf_cid_reader
    config:
        swap_cids: [['sakalmarathi', 66, 126]] # u and dot (mumbai)

  - name: word_recognizer

  - name: pdftable_finder
    config:
      skip_row_with_merged_cells: False
      heading_offset: 0 # ignore heading
      header_row: never
      pdfplumber_config:
        vertical_strategy: lines
        horizontal_strategy: lines

  - name: line_finder
    config:
      keep_empty_lines: True
      quick: True
      newline_height_multiple: 1.6

  - name: para_finder
    config:
      write_output: False

  - name: extract_order_number      

  - name: doc_translator_hf
    config:
      src_lang: 'mar_Deva'
      tgt_lang: 'eng_Latn'

  - name: text_writer
    config:
      languages: ['en', 'mr']
